<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwarven Twerk Simulator 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Dungeon Atmosphere */
        body {
            background-color: #1a1b1e;
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            /* Prevent scrolling on mobile while interacting */
        }

        .dungeon-bg {
            background-image:
                radial-gradient(circle at 50% 100%, #2d1b14 0%, #1a1b1e 60%),
                repeating-linear-gradient(90deg, #111 0px, #111 2px, transparent 2px, transparent 50px),
                repeating-linear-gradient(0deg, #111 0px, #111 2px, transparent 2px, transparent 50px);
            background-size: 100% 100%, 100px 100px, 100px 100px;
        }

        /* Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            border: 2px solid #fff;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4b5563;
            border-radius: 2px;
        }

        .shake-container {
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
        }

        /* Disco lights effect */
        .disco-light {
            position: absolute;
            top: 0;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translateX(-50%);
            pointer-events: none;
            background: radial-gradient(circle at 50% 0%, rgba(255, 165, 0, 0.2), transparent 70%);
            mix-blend-mode: overlay;
            animation: pulse-light 2s infinite alternate;
        }

        @keyframes pulse-light {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="h-screen w-screen flex flex-col items-center justify-between dungeon-bg relative">

    <!-- Header -->
    <div class="z-10 mt-6 text-center">
        <h1 class="text-4xl font-bold text-amber-500 tracking-wider uppercase drop-shadow-lg"
            style="text-shadow: 0 4px 0 #000;">Ironforge Dance Floor</h1>
        <p class="text-gray-400 text-sm mt-1">Move the sliders to control the rhythm</p>
    </div>

    <!-- The Stage -->
    <div class="flex-grow flex items-center justify-center w-full relative z-10">
        <div class="disco-light"></div>

        <!-- SVG Character -->
        <svg id="dwarf-canvas" width="400" height="500" viewBox="0 0 400 500" class="shake-container">
            <!-- Defs for gradients -->
            <defs>
                <linearGradient id="armorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#9ca3af;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
                </linearGradient>
            </defs>

            <!-- Shadow -->
            <ellipse cx="200" cy="460" rx="100" ry="20" fill="rgba(0,0,0,0.6)" />

            <!-- Group: Lower Body (The moving part) -->
            <!-- We center the rotation point around the hips -->
            <g id="lower-body-group" transform-origin="200 300">
                <!-- Left Leg -->
                <path d="M140 350 L140 450 L110 450" stroke="#4b2c20" stroke-width="20" fill="none"
                    stroke-linecap="round" />
                <path d="M110 450 L90 460" stroke="#1f2937" stroke-width="25" fill="none" stroke-linecap="round" />
                <!-- Boot -->

                <!-- Right Leg -->
                <path d="M260 350 L260 450 L290 450" stroke="#4b2c20" stroke-width="20" fill="none"
                    stroke-linecap="round" />
                <path d="M290 450 L310 460" stroke="#1f2937" stroke-width="25" fill="none" stroke-linecap="round" />
                <!-- Boot -->

                <!-- The Hips / Pants -->
                <g id="booty-shake-layer">
                    <!-- Base Hips -->
                    <rect x="130" y="280" width="140" height="80" rx="20" fill="#5D4037" />
                    <!-- Armor Plates on Thighs -->
                    <rect x="125" y="300" width="20" height="60" fill="url(#armorGrad)" rx="5" />
                    <rect x="255" y="300" width="20" height="60" fill="url(#armorGrad)" rx="5" />

                    <!-- The Cheeks (Key visual for the animation) -->
                    <circle id="cheek-left" cx="170" cy="320" r="35" fill="#4E342E" stroke="#3E2723" stroke-width="2" />
                    <circle id="cheek-right" cx="230" cy="320" r="35" fill="#4E342E" stroke="#3E2723"
                        stroke-width="2" />

                    <!-- Belt -->
                    <rect x="135" y="270" width="130" height="20" fill="#1f2937" />
                    <circle cx="200" cy="280" r="15" fill="#f59e0b" stroke="#b45309" stroke-width="3" /> <!-- Buckle -->
                </g>
            </g>

            <!-- Group: Upper Body (Moves slightly counter to lower body) -->
            <g id="upper-body-group" transform-origin="200 250">
                <!-- Torso Armor -->
                <path d="M140 270 L120 150 L280 150 L260 270 Z" fill="url(#armorGrad)" stroke="#1f2937"
                    stroke-width="2" />

                <!-- Shoulders -->
                <circle cx="110" cy="160" r="25" fill="#374151" stroke="#9ca3af" stroke-width="2" />
                <circle cx="290" cy="160" r="25" fill="#374151" stroke="#9ca3af" stroke-width="2" />

                <!-- Arms (Raised in excitement) -->
                <!-- Left Arm -->
                <path d="M110 160 Q 80 180 60 120" stroke="#fca5a5" stroke-width="25" fill="none"
                    stroke-linecap="round" />
                <rect x="40" y="100" width="40" height="30" fill="#374151" rx="5" /> <!-- Gauntlet -->

                <!-- Right Arm holding Tankard -->
                <path d="M290 160 Q 320 180 340 120" stroke="#fca5a5" stroke-width="25" fill="none"
                    stroke-linecap="round" />
                <rect x="320" y="100" width="40" height="30" fill="#374151" rx="5" /> <!-- Gauntlet -->

                <!-- Axe in Left Hand -->
                <g transform="translate(50, 110) rotate(-10)">
                    <rect x="0" y="-80" width="10" height="120" fill="#5D4037" />
                    <path d="M5 -80 L-30 -100 L-30 -40 Z" fill="#9ca3af" stroke="#fff" stroke-width="1" />
                    <path d="M5 -80 L40 -100 L40 -40 Z" fill="#9ca3af" stroke="#fff" stroke-width="1" />
                </g>

                <!-- Head Group (Back view) -->
                <g transform="translate(0, 10)">
                    <!-- Neck (thick, muscular back of neck visible between shoulders) -->
                    <rect x="180" y="150" width="40" height="30" fill="#fca5a5" />

                    <!-- Hair falling down back (Cape-like mass of hair under helmet) -->
                    <path d="M160 140 Q 150 180 140 210 L 260 210 Q 250 180 240 140 Z" fill="#b45309" />

                    <!-- Main Helmet Dome (Covering the skull completely) -->
                    <path d="M150 130 A 50 50 0 1 1 250 130 L 250 140 L 150 140 Z" fill="#4b5563" stroke="#1f2937"
                        stroke-width="2" />

                    <!-- Helmet Neck Guard (The "Mullet" of armor - specific to back of helmets) -->
                    <path d="M150 130 L 145 160 Q 200 170 255 160 L 250 130 Z" fill="#374151" stroke="#1f2937"
                        stroke-width="2" />

                    <!-- Central Ridge (Spine of helmet running down the back) -->
                    <rect x="195" y="80" width="10" height="80" fill="#1f2937" />

                    <!-- Rivets on the back of helmet -->
                    <circle cx="170" cy="120" r="3" fill="#9ca3af" />
                    <circle cx="230" cy="120" r="3" fill="#9ca3af" />
                    <circle cx="160" cy="145" r="3" fill="#9ca3af" />
                    <circle cx="240" cy="145" r="3" fill="#9ca3af" />

                    <!-- Horns (Curving forward/out) -->
                    <path d="M155 110 Q 120 90 130 60" stroke="#fef3c7" stroke-width="12" fill="none"
                        stroke-linecap="round" />
                    <path d="M245 110 Q 280 90 270 60" stroke="#fef3c7" stroke-width="12" fill="none"
                        stroke-linecap="round" />

                    <!-- Braids (Clearly hanging DOWN the back over the hair mass) -->
                    <path d="M175 160 L 170 220" stroke="#92400e" stroke-width="12" stroke-linecap="round" />
                    <path d="M225 160 L 230 220" stroke="#92400e" stroke-width="12" stroke-linecap="round" />

                    <!-- Braid ties -->
                    <rect x="164" y="200" width="12" height="5" fill="#fef3c7" />
                    <rect x="224" y="200" width="12" height="5" fill="#fef3c7" />
                </g>
            </g>

            <!-- Sweat drops (Hidden by default, shown at high intensity) -->
            <g id="sweat-particles" style="opacity: 0">
                <circle cx="150" cy="150" r="3" fill="#60a5fa" />
                <circle cx="250" cy="150" r="3" fill="#60a5fa" />
                <circle cx="200" cy="100" r="4" fill="#60a5fa" />
            </g>
        </svg>
    </div>

    <!-- Control Panel -->
    <div
        class="z-20 w-full max-w-md bg-gray-800 bg-opacity-90 p-6 rounded-t-3xl border-t-4 border-amber-600 shadow-2xl mb-0">

        <!-- Speed Control -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <label class="text-amber-500 font-bold uppercase text-sm tracking-wider">Haste (Speed)</label>
                <span id="speed-val" class="text-white font-mono bg-gray-700 px-2 rounded">1.0x</span>
            </div>
            <input type="range" id="speed-slider" min="0" max="20" step="0.5" value="5">
        </div>

        <!-- Amplitude Control -->
        <div class="mb-2">
            <div class="flex justify-between items-center mb-2">
                <label class="text-amber-500 font-bold uppercase text-sm tracking-wider">Impact (Amplitude)</label>
                <span id="amp-val" class="text-white font-mono bg-gray-700 px-2 rounded">50%</span>
            </div>
            <input type="range" id="amp-slider" min="0" max="50" step="1" value="10">
        </div>

    </div>

    <script>
        // DOM Elements
        const lowerBody = document.getElementById('lower-body-group');
        const upperBody = document.getElementById('upper-body-group');
        const bootyLayer = document.getElementById('booty-shake-layer');
        const cheekLeft = document.getElementById('cheek-left');
        const cheekRight = document.getElementById('cheek-right');
        const sweatParticles = document.getElementById('sweat-particles');

        const speedSlider = document.getElementById('speed-slider');
        const ampSlider = document.getElementById('amp-slider');
        const speedValDisplay = document.getElementById('speed-val');
        const ampValDisplay = document.getElementById('amp-val');

        // State
        let time = 0;
        let speed = 5;
        let amplitude = 10;
        let isSweating = false;

        // Configuration
        const BASE_SPEED_MULTIPLIER = 0.05;

        // UI Listeners
        speedSlider.addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            speedValDisplay.innerText = (speed / 5).toFixed(1) + 'x';
            checkSweat();
        });

        ampSlider.addEventListener('input', (e) => {
            amplitude = parseFloat(e.target.value);
            ampValDisplay.innerText = (amplitude * 2) + '%';
            checkSweat();
        });

        function checkSweat() {
            // If intensity is high, show sweat
            if (speed > 12 && amplitude > 25) {
                sweatParticles.style.opacity = 1;
            } else {
                sweatParticles.style.opacity = 0;
            }
        }

        // Animation Loop
        function animate() {
            // Increment time based on speed
            time += speed * BASE_SPEED_MULTIPLIER;

            // --- Physics of the Twerk ---

            // 1. Vertical Bounce (Sine wave)
            // Use Math.abs(sin) for a sharper bounce, or regular sin for smooth sway
            // Combining both for a "pop" effect
            const bounceY = Math.sin(time) * amplitude;

            // 2. Rotational Shake (Cosine wave)
            // Hips rotate slightly opposite to the bounce direction
            const rotateDeg = Math.cos(time) * (amplitude * 0.3);

            // 3. Independent Cheek Physics
            // The left and right cheeks move slightly out of phase
            const cheekOffset = Math.sin(time * 2) * (amplitude * 0.1);

            // --- Apply Transforms ---

            // Move the Lower Body (Hips/Legs)
            // Translate Y creates the up/down motion
            // Rotate creates the hip sway
            lowerBody.setAttribute('transform', `translate(0, ${bounceY}) rotate(${rotateDeg})`);

            // "Squash and Stretch" effect on the booty layer specifically
            // When going down, it squashes slightly
            const stretch = 1 + (bounceY * 0.002);
            bootyLayer.setAttribute('transform', `scale(1, ${stretch})`);
            // Fix transform origin for scaling to center of booty
            // (Note: SVG transform-origin handling via JS attr can be tricky, relying on CSS center usually better, 
            // but here we just apply slight scale)

            // Upper Body Counter-Balance
            // To keep the head relatively stable (or bobbing naturally), we invert some of the motion
            // The upper body lags slightly behind
            const upperBodyY = bounceY * -0.3;
            const upperBodyRot = rotateDeg * -0.5;
            upperBody.setAttribute('transform', `translate(0, ${upperBodyY}) rotate(${upperBodyRot})`);

            // Cheek Individual Movement (The "Jiggle")
            cheekLeft.setAttribute('transform', `translate(${-cheekOffset}, ${cheekOffset})`);
            cheekRight.setAttribute('transform', `translate(${cheekOffset}, ${-cheekOffset})`);

            // Animate Sweat if visible
            if (sweatParticles.style.opacity == '1') {
                const sweatY = (Date.now() / 10) % 50; // Falling effect
                sweatParticles.setAttribute('transform', `translate(0, ${sweatY})`);
            }

            requestAnimationFrame(animate);
        }

        // Start the dance
        animate();

    </script>
</body>

</html>
